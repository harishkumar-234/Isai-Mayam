<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iasai Mayam — Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- Hidden input kept for script.js compatibility — mainSearch drives filtering -->
<input type="hidden" id="sidebarSearch">

<div class="app">

  <!-- ═══════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════ -->
  <main class="main">
    <!-- ── TOPBAR ── -->
    <div class="topbar">
      <div class="topbar-row1">
        <div class="topbar-brand">
          <div class="topbar-brand-main">
            <img src="img/Logo.png" alt="Iasai Mayam Logo" class="topbar-logo">
            <div class="topbar-title">Iasai <span>Mayam</span></div>
          </div>
          <div class="topbar-slogan">Where Emotions Meet Music</div>
        </div>

        <!-- Big Search Bar -->
        <div class="search-bar-wrap" id="searchBarWrap">
          <svg class="search-icon-left" viewBox="0 0 24 24" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input class="search-input" id="mainSearch" type="text" placeholder="Search songs, movies, artists, genres…"
                 autocomplete="off">
          <button class="search-clear" id="searchClear" aria-label="Clear search">
            <svg viewBox="0 0 24 24" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>

          <!-- Search Dropdown -->
          <div class="search-dropdown" id="searchDropdown">
            <div class="dropdown-tabs">
              <button class="dropdown-tab active" data-tab="all">All</button>
              <button class="dropdown-tab" data-tab="songs">🎵 Songs</button>
              <button class="dropdown-tab" data-tab="movies">🎬 Movies</button>
            </div>
            <div class="dropdown-results" id="dropdownResults"></div>
          </div>
        </div>
      </div>

      <div class="topbar-row2">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="songs">Songs</button>
          <button class="filter-tab" data-filter="movies">Movies</button>
          <button class="filter-tab" data-filter="playlists">Playlists</button>
          <button class="filter-tab" data-filter="liked">❤ Liked</button>
        </div>
      </div>
    </div>

    <!-- ── SONG LIST (was sidebar) ── -->
    <div class="main-list-area">
      <div class="sidebar-section-title" id="sidebarLabel">All Media</div>
      <div class="playlist-container" id="playlistContainer"></div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════
     PLAYER BAR
════════════════════════════════════════ -->
  <footer class="player-bar">

    <!-- Left: current track info -->
    <div class="player-song-info">
      <div class="mini-thumb color-1" id="miniThumb">
        <span id="miniEmoji" style="font-size:22px">🎵</span>
      </div>
      <div style="min-width:0">
        <div class="player-title" id="playerTitle">No track selected</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
      <button class="heart-btn" id="heartBtn" aria-label="Like">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path class="heart-outline"
                d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
          <path class="heart-fill" fill="currentColor" stroke="none"
                d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
        </svg>
      </button>
    </div>

    <!-- Center: playback controls + progress -->
    <div class="player-center">
      <div class="controls-row">
        <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8" />
            <line x1="4" y1="20" x2="21" y2="3" />
            <polyline points="21 16 21 21 16 21" />
            <line x1="15" y1="15" x2="21" y2="21" />
          </svg>
        </button>
        <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="19 20 9 12 19 4 19 20" />
            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" fill="none" />
          </svg>
        </button>
        <button class="play-btn" id="playBtn" aria-label="Play / Pause">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" aria-label="Next">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 4 15 12 5 20 5 4" />
            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" fill="none" />
          </svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" title="Repeat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9" />
            <path d="M3 11V9a4 4 0 014-4h14" />
            <polyline points="7 23 3 19 7 15" />
            <path d="M21 13v2a4 4 0 01-4 4H3" />
          </svg>
        </button>
      </div>

      <div class="progress-container">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="time-label" id="totalTime">0:00</span>
      </div>
    </div>

    <!-- Right: volume (removed as volume is system-controlled) -->
    <div class="player-right"></div>
  </footer>

  <!-- ═══════════════════════════════════════
     CREDIT FOOTER
════════════════════════════════════════ -->
  <div class="credit-bar">
    <span class="credit-heart">♥</span>
    <span>Created by</span>
    <span class="credit-name">Harish Kumar</span>
    <span class="credit-dot">·</span>
    <span>Iasai Mayam Music Player</span>
    <span class="credit-dot">·</span>
    <span>All rights reserved &copy; 2026</span>
  </div>

</div><!-- /.app -->

<audio id="audioPlayer"></audio>

<!-- Playlist Modal -->
<div class="modal-overlay" id="playlistModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">Add to Playlist</h3>
      <button class="modal-close" onclick="closePlaylistModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="modalPlaylistsList"></div>
      <div class="modal-divider">or</div>
      <div class="create-playlist-form" onsubmit="event.preventDefault();">
        <input type="text" id="newPlaylistInput" placeholder="Enter playlist name..." maxlength="30" />
        <button class="modal-btn" onclick="createNewPlaylistFromModal()">Create & Add</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>

</html>
